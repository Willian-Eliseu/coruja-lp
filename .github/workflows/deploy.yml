name: Deploy Vue.js to github-pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Verifique se já existe @v5 ou superior

      - name: Set up Node.js
        uses: actions/setup-node@v4 # Verifique se já existe @v5 ou superior
        with:
          node-version: '24' # Atualize também a versão do Node do seu projeto
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy
          folder: dist
          clean: true
